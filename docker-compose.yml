services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  flight-events-api:
    build:
      context: ./flight-events-api
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/flight-events"]
      interval: 5s
      timeout: 3s
      retries: 5

  journeys-api:
    build:
      context: ./journeys-api
    ports:
      - "8000:8000"
    environment:
      FLIGHT_EVENTS_API_URL: http://flight-events-api:8001
      REDIS_URL: redis://redis:6379
      CACHE_TTL: 3600
    depends_on:
      redis:
        condition: service_healthy
      flight-events-api:
        condition: service_healthy
